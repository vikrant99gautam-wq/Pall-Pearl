<main class="pt-[120px] pb-section-gap px-margin-mobile md:px-margin-desktop max-w-[1440px] mx-auto min-h-[80vh]">
    <div class="mb-12 text-center md:text-left">
        <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">Checkout</h1>
        <p class="font-body-md text-on-surface-variant">Please provide your shipping details to place your order via WhatsApp.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">
        <!-- Form Section -->
        <div class="lg:col-span-7 xl:col-span-8 order-2 lg:order-1">
            <div class="glass-panel smooth-shadow rounded-3xl p-6 md:p-8">
                <h2 class="font-headline-lg text-2xl text-primary mb-6">Shipping Details</h2>
                <form id="checkout-form" class="flex flex-col gap-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="font-label-sm text-label-sm uppercase text-on-surface-variant" for="fullName">Full Name *</label>
                            <input type="text" id="fullName" required class="w-full bg-surface-container border border-outline-variant rounded-xl p-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="Jane Doe">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="font-label-sm text-label-sm uppercase text-on-surface-variant" for="phone">Phone Number *</label>
                            <input type="tel" id="phone" required class="w-full bg-surface-container border border-outline-variant rounded-xl p-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="+91 98765 43210">
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <label class="font-label-sm text-label-sm uppercase text-on-surface-variant" for="email">Email Address</label>
                        <input type="email" id="email" class="w-full bg-surface-container border border-outline-variant rounded-xl p-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="jane@example.com">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="font-label-sm text-label-sm uppercase text-on-surface-variant" for="address">Street Address *</label>
                        <textarea id="address" required class="w-full bg-surface-container border border-outline-variant rounded-xl p-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none h-24" placeholder="House/Flat No, Building Name, Street..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="font-label-sm text-label-sm uppercase text-on-surface-variant" for="city">City *</label>
                            <input type="text" id="city" required class="w-full bg-surface-container border border-outline-variant rounded-xl p-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="City">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="font-label-sm text-label-sm uppercase text-on-surface-variant" for="state">State *</label>
                            <input type="text" id="state" required class="w-full bg-surface-container border border-outline-variant rounded-xl p-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="State">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="font-label-sm text-label-sm uppercase text-on-surface-variant" for="pincode">Pincode *</label>
                            <input type="text" id="pincode" required class="w-full bg-surface-container border border-outline-variant rounded-xl p-4 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="123456">
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Summary Section -->
        <div class="lg:col-span-5 xl:col-span-4 order-1 lg:order-2">
            <div class="glass-panel smooth-shadow rounded-3xl p-6 md:p-8 sticky top-[120px]">
                <h2 class="font-headline-lg text-2xl text-primary mb-6">Order Summary</h2>
                
                <div id="checkout-items" class="flex flex-col gap-4 mb-6 max-h-[300px] overflow-y-auto pr-2">
                    <!-- Items will be populated by JS -->
                </div>

                <div class="border-t border-outline-variant/30 pt-6 flex flex-col gap-3 mb-8">
                    <div class="flex justify-between font-body-md text-on-surface-variant">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">₹0</span>
                    </div>
                    <div class="flex justify-between font-body-md text-on-surface-variant">
                        <span>Shipping</span>
                        <span>Free</span>
                    </div>
                    <div class="flex justify-between font-headline-lg text-xl text-primary pt-2 border-t border-outline-variant/30 mt-2">
                        <span>Total</span>
                        <span id="checkout-total">₹0</span>
                    </div>
                </div>

                <button id="btn-whatsapp-checkout" type="button" class="w-full py-4 rounded-xl bg-[#25D366] text-white font-label-sm text-label-sm uppercase tracking-widest hover:opacity-90 transition-opacity flex items-center justify-center gap-2 flex-wrap">
                    <span class="material-symbols-outlined">chat</span>
                    Complete Order on WhatsApp
                </button>
            </div>
        </div>
    </div>
</main>
